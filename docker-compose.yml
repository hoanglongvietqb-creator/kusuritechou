services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kusuri
      POSTGRES_PASSWORD: kusuri_dev
      POSTGRES_DB: kusuri_nomitechou
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
